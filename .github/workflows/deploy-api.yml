name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/types/**'
      - 'render.yaml'

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Drizzle migrations against Supabase (via DIRECT_URL)
        run: pnpm db:migrate
        env:
          # DIRECT_URL bypasses Supavisor — required for DDL during migrations
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - name: Deploy API service via Render deploy hook
        run: |
          curl -s "${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}" \
            -X POST \
            -H "Content-Type: application/json" \
            --fail \
            -o /dev/null

      - name: Deploy Worker service via Render deploy hook
        run: |
          curl -s "${{ secrets.RENDER_WORKER_DEPLOY_HOOK_URL }}" \
            -X POST \
            -H "Content-Type: application/json" \
            --fail \
            -o /dev/null
