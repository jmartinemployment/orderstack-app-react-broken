name: Typecheck

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages (required before typecheck)
        run: pnpm build --filter="@orderstack/config" --filter="@orderstack/ipc" --filter="@orderstack/types"

      - name: Typecheck all packages and apps
        run: pnpm typecheck
