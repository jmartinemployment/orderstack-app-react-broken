name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter="!@orderstack/backoffice" --filter="!@orderstack/api" --filter="!@orderstack/worker"

      - name: Package Electron app (macOS)
        run: pnpm make
        working-directory: apps/backoffice
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/backoffice/out/make/**/*

  release-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm build --filter="!@orderstack/backoffice" --filter="!@orderstack/api" --filter="!@orderstack/worker"

      - name: Package Electron app (Windows)
        run: pnpm make
        working-directory: apps/backoffice
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/backoffice/out/make/**/*
