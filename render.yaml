# Render.com deployment configuration
# Connect this GitHub repo in Render dashboard — this file is auto-detected.
# All secret values are set in Render's Environment tab (sync: false means
# the value is managed in the dashboard, not in this file).

services:
  # ─── API Server ─────────────────────────────────────────────────────────────
  - type: web
    name: orderstack-api
    runtime: node
    region: ohio
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @orderstack/api build
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEVICE_CERT_PRIVATE_KEY
        sync: false
      - key: DEVICE_CERT_PUBLIC_KEY
        sync: false
      - key: DEVICE_CERT_TTL
        value: 31536000
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: PAYPAL_MODE
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SENTRY_DSN_API
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_PUBLIC_URL
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_MASTER_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
    # Secret Files — stored as files, read from /etc/secrets/<filename> at runtime
    secretFiles:
      - name: PAYPAL_CLIENT_SECRET
      - name: RESEND_API_KEY
      - name: CSRF_SECRET
      - name: MFA_ENCRYPTION_KEY

  # ─── Background Worker ───────────────────────────────────────────────────────
  - type: worker
    name: orderstack-worker
    runtime: node
    region: ohio
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @orderstack/worker build
    startCommand: node apps/worker/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_PUBLIC_URL
        sync: false
      - key: SENTRY_DSN_API
        sync: false
